<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiniela Mundial 2026</title>
  <style>
    :root { --bg-color: #f7f5f0; --primary: #1e293b; --accent: #d4af37; --text: #334155; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-color); color: var(--text); margin: 0; padding: 20px; }
    
    .header-bar { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 20px auto; }
    .header-bar h1 { margin: 0; font-size: 24px; color: var(--primary); }
    .btn-admin-login { background: none; border: 2px solid var(--primary); color: var(--primary); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    
    .container { max-width: 1200px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; align-items: flex-start; }
    
    .sidebar { display: none; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 300px; height: fit-content; }
    .admin-controls-active { display: block !important; }
    
    .input-group { display: flex; gap: 8px; margin-bottom: 20px; margin-top: 10px; }
    input[type="text"] { flex: 1; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; }
    button { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    .btn-danger { background: #dc2626; width: 100%; padding: 10px; font-weight: bold; margin-bottom: 15px; }
    
    ul.player-list { list-style: none; padding: 0; max-height: 300px; overflow-y: auto; }
    ul.player-list li { padding: 8px 0; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between;}

    /* El contenedor SVG siempre visible */
    .svg-container { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; flex: 1; min-width: 320px; display: flex; justify-content: center; overflow: hidden; }
    svg { max-width: 100%; height: auto; }
    .node-link { fill: none; stroke: #cbd5e1; stroke-width: 1.5; }
    .node-link.active { stroke: var(--accent); stroke-width: 2.5; }
    .node-circle { fill: white; stroke: #475569; stroke-width: 1.5; cursor: default; transition: transform 0.2s; }
    
    .admin-mode .node-circle { cursor: pointer; }
    .admin-mode .node-circle:hover { transform: scale(1.3); }
    
    .node-text { font-size: 10px; font-weight: 500; pointer-events: none; fill: #1e293b; }
    
    .winner-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
    .winner-box h2 { margin: 0; color: var(--primary); font-size: 16px; }
    .winner-box small { color: #64748b; font-weight: bold; }

    .mapping-section { background: white; padding: 20px; border-radius: 12px; margin-top: 20px; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .grid-mapping { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-top: 15px; }
    .card-map { padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
    .card-map b { color: #0284c7; }
    
    .loader { text-align: center; width: 100%; padding: 40px; color: #64748b; font-style: italic; }
  </style>
</head>
<body>

  <div class="header-bar">
    <h1>🏆 Quiniela Mundial 2026</h1>
    <button class="btn-admin-login" id="btnLogin" onclick="loginAdmin()">🔐 Modo Admin</button>
  </div>

  <div class="container" id="mainContainer">
    <div class="loader" id="loader">Conectando a base de datos...</div>
  </div>

  <script>
    // =================================================================
    // TU URL DE APLICACIÓN WEB
    // =================================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbxcPyvf3VM8-buq3X59B0bQphioZOoh-jMkKGkT1b785qud7EQ7NY9f9dvZAbAXUyk/exec"; 
    
    let ES_ADMIN = false;
    let DATA = null;

    window.onload = () => cargarDatosIniciales();

    async function cargarDatosIniciales() {
      try {
        // En peticiones a Google Apps Script, redirect: 'follow' es clave
        let respuesta = await fetch(API_URL, { redirect: 'follow' });
        
        if (!respuesta.ok) {
          throw new Error(`Error HTTP: ${respuesta.status}`);
        }

        DATA = await respuesta.json();
        construirInterfaz();
        renderizarDatos();
      } catch (error) {
        document.getElementById('loader').innerText = "⚠️ Error al conectar con Google Sheets. Por favor, recarga la página o verifica los permisos en Apps Script.";
        console.error(error);
      }
    }

    async function enviarAccion(payload) {
      try {
        document.body.style.cursor = 'wait';
        let respuesta = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify(payload),
          redirect: 'follow' // Necesario para POST en Google Script
        });
        let nuevaData = await respuesta.json();
        document.body.style.cursor = 'default';
        if(nuevaData.error) throw new Error(nuevaData.error);
        return nuevaData;
      } catch (error) {
        document.body.style.cursor = 'default';
        alert("Error: " + error.message);
        return null;
      }
    }

    async function loginAdmin() {
      let pin = prompt("Introduce el PIN de administrador:");
      if(!pin) return;
      
      let res = await enviarAccion({ accion: 'validarPin', pin: pin });
      if (res && res.valido) {
        ES_ADMIN = true;
        document.getElementById('sidebarAdmin').classList.add('admin-controls-active');
        document.getElementById('svgContainer').classList.add('admin-mode');
        document.getElementById('btnLogin').innerText = "🔓 Admin Activo";
      } else {
        alert("PIN incorrecto");
      }
    }

    // Se eliminó el "if" que ocultaba el SVG si no era admin, para que sea siempre visible
    function construirInterfaz() {
      const container = document.getElementById('mainContainer');
      container.innerHTML = `
        <div class="sidebar" id="sidebarAdmin">
          <h3>🛠 Panel de Control</h3>
          <div class="input-group">
            <input type="text" id="txtNombre" placeholder="Nombre jugador...">
            <button onclick="anadirJugador()">Añadir</button>
          </div>
          <button class="btn-danger" id="btnCerrar" onclick="cerrarQuiniela()">🔒 Cerrar y Sortear</button>
          <h4>Participantes (<span id="numJugadores">0</span>)</h4>
          <ul id="listaJugadores" class="player-list"></ul>
        </div>
        
        <div class="svg-container" id="svgContainer">
          <svg id="bracketSvg" viewBox="0 0 800 800" width="800" height="800"></svg>
          <div class="winner-box" id="winnerBox">
            <h2 id="winTeam">?</h2>
            <small id="winOwner">Esperando campeón</small>
          </div>
        </div>

        <div class="mapping-section">
          <h3>📋 Reparto de Países</h3>
          <div id="gridMapping" class="grid-mapping"></div>
        </div>
      `;
      if(ES_ADMIN) {
        document.getElementById('sidebarAdmin').classList.add('admin-controls-active');
        document.getElementById('svgContainer').classList.add('admin-mode');
      }
    }

    async function anadirJugador() {
      let txt = document.getElementById('txtNombre');
      let nombre = txt.value.trim();
      if(nombre) {
        txt.disabled = true;
        let res = await enviarAccion({ accion: 'agregarJugador', nombre: nombre });
        if(res) { DATA = res; txt.value = ''; renderizarDatos(); }
        txt.disabled = false;
      }
    }

    async function cerrarQuiniela() {
      if(confirm("¿Estás seguro? Esto repartirá los equipos a los jugadores actuales.")) {
        document.getElementById('btnCerrar').disabled = true;
        let res = await enviarAccion({ accion: 'cerrar', equipos: DATA.equiposIniciales });
        if(res) { DATA = res; renderizarDatos(); }
      }
    }

    function renderizarDatos() {
      // 1. Sidebar
      document.getElementById('numJugadores').innerText = DATA.jugadores.length;
      document.getElementById('listaJugadores').innerHTML = DATA.jugadores.map(j => `<li><span>👤 ${j.nombre}</span> <small>${j.equipos.length} eq.</small></li>`).join('');
      
      let btnCerrar = document.getElementById('btnCerrar');
      if(DATA.estado === 'Cerrada') {
        btnCerrar.innerText = "Sorteo Finalizado";
        btnCerrar.disabled = true;
        document.getElementById('txtNombre').disabled = true;
      }

      // 2. Dibujar Gráfico Radial Siempre
      dibujarBracket();

      // 3. Grid Inferior visible desde el principio
      let grid = document.getElementById('gridMapping');
      // Ahora dibujamos la lista siempre, sin importar si está abierta o cerrada
      grid.innerHTML = DATA.equiposIniciales.map(e => {
        let dueno = DATA.jugadores.find(j => j.equipos.includes(e));
        if (e === "Eliminado") return ''; // Oculta los espacios nulos
        // Si no hay dueño asignado aún, muestra 'Sin asignar'
        let nombreMostrado = dueno ? dueno.nombre : "<span style='color:#94a3b8;'>Sin asignar</span>";
        return `<div class="card-map"><span>${e}</span> <b>${nombreMostrado}</b></div>`;
      }).join('');
    }

    function dibujarBracket() {
      const svg = document.getElementById('bracketSvg');
      svg.innerHTML = ''; 
      const CX = 400, CY = 400;
      const radios = { R1: 360, R2: 280, R3: 200, R4: 120, R5: 60 };
      const slots = { R1: 32, R2: 16, R3: 8, R4: 4, R5: 2 };
      const rondas = Object.keys(slots);

      for (let r = 0; r < rondas.length - 1; r++) {
        let rAct = rondas[r], rSig = rondas[r+1];
        for (let i = 0; i < slots[rAct]; i++) {
          let ang1 = (i * 2 * Math.PI) / slots[rAct] - Math.PI/2;
          let p1 = { x: CX + radios[rAct] * Math.cos(ang1), y: CY + radios[rAct] * Math.sin(ang1) };
          let iSig = Math.floor(i / 2);
          let ang2 = (iSig * 2 * Math.PI) / slots[rSig] - Math.PI/2;
          let p2 = { x: CX + radios[rSig] * Math.cos(ang2), y: CY + radios[rSig] * Math.sin(ang2) };
          let rMedio = (radios[rAct] + radios[rSig]) / 2;
          let pM = { x: CX + rMedio * Math.cos(ang1), y: CY + rMedio * Math.sin(ang1) };

          let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", `M ${p1.x} ${p1.y} L ${pM.x} ${pM.y} L ${p2.x} ${p2.y}`);
          path.setAttribute("class", "node-link");
          if(DATA.bracket[rAct + '_' + i]) path.classList.add('active');
          svg.appendChild(path);
        }
      }

      rondas.forEach(r => {
        for(let i=0; i<slots[r]; i++) {
          let ang = (i * 2 * Math.PI) / slots[r] - Math.PI/2;
          let x = CX + radios[r] * Math.cos(ang);
          let y = CY + radios[r] * Math.sin(ang);
          let equipo = DATA.bracket[r + '_' + i] || "";

          let g = document.createElementNS("http://www.w3.org/2000/svg", "g");
          let c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          c.setAttribute("cx", x); c.setAttribute("cy", y); c.setAttribute("r", r==='R1'? 14: 12);
          c.setAttribute("class", "node-circle");
          if(equipo) c.style.fill = "#fef08a";

          c.onclick = async () => {
            if(!ES_ADMIN || !equipo || equipo === "Eliminado") return;
            let prox = { R1:'R2', R2:'R3', R3:'R4', R4:'R5', R5:'Campeon' }[r];
            let res = await enviarAccion({ accion: 'avanzar', ronda: prox, slot: Math.floor(i/2), equipo: equipo });
            if(res) { DATA = res; renderizarDatos(); }
          };

          g.appendChild(c);
          if(equipo && equipo !== "Eliminado") {
            let t = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t.setAttribute("x", x); t.setAttribute("y", y+4); t.setAttribute("text-anchor", "middle");
            t.setAttribute("class", "node-text");
            t.textContent = equipo.split(" ").pop() || equipo.substring(0,3);
            g.appendChild(t);
            let title = document.createElementNS("http://www.w3.org/2000/svg", "title");
            title.textContent = equipo;
            g.appendChild(title);
          }
          svg.appendChild(g);
        }
      });

      let camp = DATA.bracket['Campeon_0'];
      let winBox = document.getElementById('winnerBox');
      if(camp) {
        document.getElementById('winTeam').innerText = camp;
        let d = DATA.jugadores.find(j => j.equipos.includes(camp));
        document.getElementById('winOwner').innerText = "Premio para: " + (d ? d.nombre : "S/A");
        winBox.style.background = "#fef08a"; winBox.style.padding = "10px"; winBox.style.borderRadius = "8px";
      } else {
        document.getElementById('winTeam').innerText = "🏆";
        document.getElementById('winOwner').innerText = "Esperando Campeón";
        winBox.style.background = "none";
      }
    }
  </script>
</body>
</html>
