<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quiniela Premium 2026</title>
  <style>
    :root { var(--accent): #00f2fe; var(--bg-dark): #020024; var(--glass-bg): rgba(15, 23, 42, 0.45); }
    body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #020024 0%, #090979 40%, #0072ff 100%); background-attachment: fixed; color: #f8fafc; margin: 0; padding: 10px 10px 80px 10px; overflow-x: hidden; }
    h1 { text-align: center; font-size: 26px; text-shadow: 0 4px 15px rgba(0,0,0,0.6); margin-bottom: 20px;}
    .secret-btn { cursor: pointer; filter: drop-shadow(0 2px 8px rgba(0,242,254,0.4)); }
    
    .tab-content { display: none; animation: fadeIn 0.4s; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* NAVEGACIÓN INFERIOR (TABS) */
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(2,0,36,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; }
    .nav-item { color: rgba(255,255,255,0.5); text-align: center; font-size: 12px; cursor: pointer; flex: 1; font-weight: bold; transition: 0.3s;}
    .nav-item.active { color: #00f2fe; text-shadow: 0 0 10px rgba(0,242,254,0.5); }
    .nav-item i { display: block; font-size: 20px; margin-bottom: 4px; }

    /* ESTILOS GLOBALES Y CRISTALINOS */
    .glass-panel { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; width: 100%; box-sizing: border-box; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3); margin-bottom: 20px;}
    button { background: #00f2fe; color: #0f172a; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3); width: 100%;}
    input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15,23,42,0.6); color: white; box-sizing: border-box;}
    
    /* MODAL */
    .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(2,0,36,0.85); z-index: 200; justify-content: center; align-items: center; backdrop-filter: blur(6px); }
    .modal-box { background: #0f172a; padding: 25px; border-radius: 16px; width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); color: white; }

    /* PESTAÑA 1: BRACKET ORIGAMI (32 EQUIPOS) */
    .svg-wrapper { width: 100%; display: flex; justify-content: center; align-items: center; }
    svg { width: 100%; max-height: 80vh; transition: all 0.5s; }
    .node-link { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 2.5; }
    .node-link.active { stroke: #00f2fe; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 25 8; animation: fluidFlow 0.3s linear infinite; filter: drop-shadow(0px 0px 8px #00f2fe); }
    @keyframes fluidFlow { from { stroke-dashoffset: 33; } to { stroke-dashoffset: 0; } }
    .node-circle { fill: #111827; stroke: rgba(255,255,255,0.2); stroke-width: 2; }
    .node-circle.active { stroke: #00f2fe; fill: #030712; stroke-width: 3; }
    .eliminated-node { opacity: 0.3; filter: grayscale(100%); transition: all 0.5s; }
    .node-text { font-size: 9px; font-weight: bold; fill: #fff; pointer-events: none; }

    /* PESTAÑA 2: APUESTAS Y PREDICCIONES */
    .match-card { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
    .match-title { display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; margin-bottom: 5px;}
    .match-date { font-size: 11px; color: #94a3b8; text-align: center; margin-bottom: 15px; }
    .wdl-group { display: flex; gap: 5px; margin-bottom: 15px; }
    .wdl-btn { flex: 1; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 8px; border-radius: 6px; font-size: 12px; text-align: center; cursor: pointer;}
    .wdl-btn:hover { background: rgba(0,242,254,0.2); border-color: #00f2fe; }
    .wdl-stats { font-size: 10px; color: #00f2fe; margin-top: 4px; display: block;}
    
    /* PESTAÑA 3: PERFIL */
    .profile-stat { background: rgba(0,242,254,0.1); border: 1px solid #00f2fe; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 15px;}
    .profile-stat h2 { margin: 0; font-size: 28px; color: #00f2fe; }
  </style>
</head>
<body>

  <h1><span class="secret-btn" onclick="triggerAuth()">🏆</span> Quiniela 2026</h1>

  <!-- PESTAÑA 1: MUNDIALISTA -->
  <div id="tab-bracket" class="tab-content active container">
    <div class="glass-panel" style="padding:0; overflow:hidden;">
      <div class="svg-wrapper" id="svgContainer"><svg id="bracketSvg" viewBox="0 0 1000 1000"></svg></div>
    </div>
  </div>

  <!-- PESTAÑA 2: AL MARCADOR -->
  <div id="tab-matches" class="tab-content container">
    <div class="glass-panel">
      <h3 style="margin-top:0; color:#00f2fe; text-align:center;">⚽ Sala de Apuestas ($30 MXN)</h3>
      <p style="font-size:12px; text-align:center; color:#cbd5e1;">Cierra 1 hora antes del partido.</p>
      <div id="matchesList"></div>
    </div>
  </div>

  <!-- PESTAÑA 3: MI PERFIL -->
  <div id="tab-profile" class="tab-content container">
    <div class="glass-panel" id="profileLogin">
      <h3 style="text-align:center;">👤 Mi Perfil</h3>
      <input type="text" id="perfilCode" placeholder="Ingresa tu código de 6 dígitos" style="text-transform: uppercase;">
      <button onclick="cargarPerfil()">Ver mis apuestas</button>
      
      <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin: 25px 0;">
      <h4 style="text-align:center; color:#94a3b8;">¿No tienes código?</h4>
      <input type="text" id="reqPhone" placeholder="Tu WhatsApp (Ej: 521333...)">
      <button onclick="solicitarCodigoWhatsApp()" style="background:transparent; border:1px solid #00f2fe; color:#00f2fe; box-shadow:none;">📲 Solicitar Código</button>
    </div>
    <div class="glass-panel" id="profileData" style="display:none;"></div>
  </div>

  <!-- NAVEGACIÓN INFERIOR -->
  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('tab-bracket', this)"><i>🏆</i>Mundialista</div>
    <div class="nav-item" onclick="switchTab('tab-matches', this)"><i>⚽</i>Apuestas</div>
    <div class="nav-item" onclick="switchTab('tab-profile', this)"><i>👤</i>Mi Perfil</div>
  </div>

  <!-- MODALES DE REGISTRO E INTERACCIÓN -->
  <div class="modal-overlay" id="authModal"><div class="modal-box" id="modalDynamic"></div></div>

  <script>
    // ==========================================
    // ¡PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT!
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbyizNP6mZogEqYC_2TiZSz7BT30G5QTNZw3dD-siePBX3chUzAfHyZEFNItniT4ktg4/exec"; 
    
    let DATA = null; let CODIGO_ACTIVO = null; let ES_ADMIN = false;
    const FLAG_MAP = { "Sudáfrica": "za", "Canadá": "ca", "Países Bajos": "nl", "Marruecos": "ma", "Francia": "fr", "Suecia": "se", "Alemania": "de", "Paraguay": "py", "Brasil": "br", "Japón": "jp", "Costa de Marfil": "ci", "Noruega": "no", "México": "mx", "Ecuador": "ec", "Inglaterra": "gb-eng", "RD Congo": "cd", "Bélgica": "be", "Senegal": "sn", "EE.UU.": "us", "Bosnia": "ba", "España": "es", "Austria": "at", "Portugal": "pt", "Croacia": "hr", "Suiza": "ch", "Argelia": "dz", "Australia": "au", "Egipto": "eg", "Argentina": "ar", "Cabo Verde": "cv", "Colombia": "co", "Ghana": "gh" };

    window.onload = async () => {
      let res = await fetch(API_URL); DATA = await res.json();
      dibujarBracket(); renderizarPartidos(); window.addEventListener('resize', dibujarBracket);
    };

    function switchTab(tabId, el) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById(tabId).classList.add('active'); el.classList.add('active');
    }

    async function enviarAccion(payload) {
      document.body.style.cursor = 'wait';
      let r = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
      document.body.style.cursor = 'default'; return await r.json();
    }

    async function solicitarCodigoWhatsApp() {
      let t = document.getElementById('reqPhone').value; if(!t) return;
      let r = await enviarAccion({ accion: 'solicitarCodigo', telefono: t }); alert(r.msg);
    }

    async function triggerAuth() {
      let code = prompt("Código Admin o Registro:"); if(!code) return;
      let r = await enviarAccion({ accion: 'validarCodigo', codigo: code.toUpperCase() });
      if(r.valido && r.tipo === 'admin') { ES_ADMIN = true; alert("Admin Activado. Haz clic en el árbol para avanzar equipos."); }
      else if(r.valido && r.modo === 'registro') { CODIGO_ACTIVO = code; mostrarRegistro(); }
      else alert(r.error || "Código usado. Ve a Mi Perfil.");
    }

    function mostrarRegistro() {
      let html = `<h3>¡Código Válido!</h3><p>Costo Sorteo: <b>$50 MXN</b></p>
        <input type="text" id="rNom" placeholder="Nombre completo">
        <input type="text" id="rApo" placeholder="Nickname">
        <button onclick="enviarRegistro()">Confirmar Inscripción</button>`;
      document.getElementById('modalDynamic').innerHTML = html; document.getElementById('authModal').style.display = 'flex';
    }

    async function enviarRegistro() {
      let r = await enviarAccion({ accion: 'registrarUsuario', datos: { nombre: document.getElementById('rNom').value, apodo: document.getElementById('rApo').value, codigo: CODIGO_ACTIVO } });
      if(r && !r.error) { DATA = r; document.getElementById('authModal').style.display = 'none'; alert("¡Inscrito al sorteo mundialista!"); }
    }

    // ===============================================
    // SALA DE APUESTAS
    // ===============================================
    function renderizarPartidos() {
      let html = '';
      DATA.partidos.forEach(p => {
        if(p.g1 !== "") return; // No mostrar finalizados
        let d = new Date(p.f); let hora = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); let fecha = d.toLocaleDateString();
        
        html += `
        <div class="match-card">
          <div class="match-date">📅 ${fecha} - ⏰ ${hora}</div>
          <div class="match-title"><span>${p.eq1}</span> <span>vs</span> <span>${p.eq2}</span></div>
          
          <div style="font-size:12px; margin:10px 0 5px 0; color:#cbd5e1;">1. Gana, Empata o Pierde (Bolsa: <b>$${p.bW}</b>)</div>
          <div class="wdl-group">
            <div class="wdl-btn" onclick="apostar('${p.id}', 'WDL', '1')">Local <span class="wdl-stats">${p.stats.gana1}%</span></div>
            <div class="wdl-btn" onclick="apostar('${p.id}', 'WDL', 'X')">Empate <span class="wdl-stats">${p.stats.empate}%</span></div>
            <div class="wdl-btn" onclick="apostar('${p.id}', 'WDL', '2')">Visita <span class="wdl-stats">${p.stats.gana2}%</span></div>
          </div>
          
          <div style="font-size:12px; margin:10px 0 5px 0; color:#cbd5e1;">2. Marcador Exacto (Bolsa: <b>$${p.bE}</b>)</div>
          <div style="display:flex; gap:10px;">
            <input type="number" id="g1_${p.id}" placeholder="Goles L" style="margin:0;">
            <input type="number" id="g2_${p.id}" placeholder="Goles V" style="margin:0;">
            <button style="flex:1; padding:8px; font-size:12px;" onclick="apostar('${p.id}', 'EXACTO')">Apostar</button>
          </div>
        </div>`;
      });
      document.getElementById('matchesList').innerHTML = html;
    }

    async function apostar(pId, tipo, valWDL) {
      if(!CODIGO_ACTIVO) {
        CODIGO_ACTIVO = prompt("Para apostar, ingresa tu código de 6 dígitos:");
        if(!CODIGO_ACTIVO) return;
      }
      if(confirm(`Esta apuesta descontará $30 MXN a tu cuenta. ¿Confirmar?`)) {
        let payload = { accion: tipo === 'WDL' ? 'apostarWDL' : 'apostarExacto', codigo: CODIGO_ACTIVO.toUpperCase(), partidoId: pId };
        if(tipo === 'WDL') payload.prediccion = valWDL;
        else { payload.g1 = document.getElementById(`g1_${pId}`).value; payload.g2 = document.getElementById(`g2_${pId}`).value; }
        
        let r = await enviarAccion(payload);
        if(r.error) alert(r.error); else { DATA = r; renderizarPartidos(); alert("¡Apuesta registrada con éxito!"); }
      }
    }

    // ===============================================
    // PERFIL DEL USUARIO
    // ===============================================
    async function cargarPerfil() {
      let code = document.getElementById('perfilCode').value.toUpperCase();
      let r = await enviarAccion({ accion: 'validarCodigo', codigo: code });
      if(r.valido && r.modo === 'activo') {
        CODIGO_ACTIVO = code;
        let misPreds = DATA.predicciones.filter(p => p.cod === code);
        let gastado = misPreds.length * 30;
        let ganado = misPreds.reduce((sum, p) => sum + (Number(p.ganancia) || 0), 0);
        
        let html = `
          <h3 style="text-align:center; color:#00f2fe;">Hola, ${r.apodo}</h3>
          <div style="display:flex; gap:10px;">
            <div class="profile-stat" style="flex:1;"><h2>$${gastado}</h2><small>Gastado</small></div>
            <div class="profile-stat" style="flex:1; border-color:#10b981;">
              <h2 style="color:#10b981;">$${ganado}</h2><small>Ganado</small>
            </div>
          </div>
          <h4>Tus Predicciones:</h4>
          <ul style="font-size:12px; padding-left:15px; color:#cbd5e1;">
            ${misPreds.map(p => `<li>Partido ${p.pid} | ${p.tipo}: <b>${p.val}</b> ${p.ganancia > 0 ? '✅ ¡Ganaste $'+p.ganancia+'!' : ''}</li>`).join('')}
          </ul>
          <p style="font-size:11px; text-align:center; color:#ef4444;">Para cobrar tus ganancias contacta al Administrador.</p>
          <button onclick="document.getElementById('profileLogin').style.display='block'; document.getElementById('profileData').style.display='none';" style="background:transparent; border:1px solid white; color:white; box-shadow:none;">Cerrar Sesión</button>
        `;
        document.getElementById('profileLogin').style.display = 'none';
        document.getElementById('profileData').innerHTML = html;
        document.getElementById('profileData').style.display = 'block';
      } else alert(r.error || "Código no encontrado.");
    }

    // ===============================================
    // MOTOR GRÁFICO (32 EQUIPOS - MUNDIALISTA)
    // ===============================================
    function dibujarBracket() {
      const svg = document.getElementById('bracketSvg'); const isM = window.innerWidth <= 850;
      svg.setAttribute("viewBox", isM ? "0 0 800 2000" : "0 0 1000 1000"); // Ampliado verticalmente para 32 equipos
      if (!document.getElementById('pL')) svg.innerHTML = `<defs><clipPath id="cp"><circle cx="0.5" cy="0.5" r="0.5"></circle></clipPath></defs><g id="pL"></g><g id="nL"></g><g id="cG"></g>`;
      
      let pL = document.getElementById('pL'), nL = document.getElementById('nL'), cG = document.getElementById('cG');
      const CX = 500, CY = 500; const radios = { R1: 450, R2: 360, R3: 270, R4: 180, R5: 90 }; const slots = { R1: 32, R2: 16, R3: 8, R4: 4, R5: 2 }; const rondas = Object.keys(slots);
      
      let coords = {};
      rondas.forEach(r => {
        for(let i=0; i<slots[r]; i++) {
          let x, y;
          if (!isM) {
            let ang = (i * 2 * Math.PI) / slots[r] - Math.PI/2;
            x = CX + radios[r] * Math.cos(ang); y = CY + radios[r] * Math.sin(ang);
          } else {
            let isLeft = i < (slots[r] / 2);
            if (r === 'R1') { x = isLeft ? 50 : 750; y = 50 + (isLeft ? i : i - 16) * 60; }
            else {
              let pR = rondas[rondas.indexOf(r)-1]; let c1 = coords[pR+'_'+(i*2)], c2 = coords[pR+'_'+(i*2+1)];
              x = isLeft ? {R2:150,R3:250,R4:330,R5:380}[r] : 800 - {R2:150,R3:250,R4:330,R5:380}[r]; y = (c1.y + c2.y)/2;
            }
          }
          coords[r + '_' + i] = {x, y};
        }
      });

      for (let r = 0; r < rondas.length - 1; r++) {
        let rA = rondas[r], rS = rondas[r+1];
        for (let i = 0; i < slots[rA]; i++) {
          let p1 = coords[rA+'_'+i], p2 = coords[rS+'_'+Math.floor(i/2)], pM;
          if(!isM){ let rM = (radios[rA]+radios[rS])/2; let ang1 = (i*2*Math.PI)/slots[rA] - Math.PI/2; pM = {x:CX+rM*Math.cos(ang1), y:CY+rM*Math.sin(ang1)}; } else { pM = {x:p2.x, y:p1.y}; }
          
          let path = document.getElementById(`l_${rA}_${i}`); if (!path) { path = document.createElementNS("http://www.w3.org/2000/svg", "path"); path.id = `l_${rA}_${i}`; path.setAttribute("class", "node-link"); pL.appendChild(path); }
          let eqO = DATA.bracket[rA+'_'+i], eqD = DATA.bracket[rS+'_'+Math.floor(i/2)];
          if(eqO && eqO !== "Eliminado" && eqO === eqD) path.classList.add('active'); else path.classList.remove('active');
          path.setAttribute("d", `M ${p1.x} ${p1.y} L ${pM.x} ${pM.y} L ${p2.x} ${p2.y}`);
        }
      }

      rondas.forEach(r => {
        for(let i=0; i<slots[r]; i++) {
          let eq = DATA.bracket[r+'_'+i] || "", rad = isM ? 16 : 14, g = document.getElementById(`n_${r}_${i}`);
          if (!g) { g = document.createElementNS("http://www.w3.org/2000/svg", "g"); g.id = `n_${r}_${i}`; let c = document.createElementNS("http://www.w3.org/2000/svg", "circle"); c.setAttribute("class", "node-circle"); g.appendChild(c); nL.appendChild(g); }
          
          let c = g.querySelector('circle'); c.setAttribute("r", rad); g.setAttribute("transform", `translate(${coords[r+'_'+i].x}, ${coords[r+'_'+i].y})`);
          let isE = false, isF = false;
          if(eq && eq !== "Eliminado") {
            let nS = DATA.bracket[{R1:'R2',R2:'R3',R3:'R4',R4:'R5',R5:'Campeon'}[r]+'_'+(r==='R5'?0:Math.floor(i/2))];
            if(!nS) isF = true; else if(nS !== eq && nS !== "Eliminado") isE = true;
          }
          g.className.baseVal = "node-group" + (isE ? " eliminated-node" : ""); c.className.baseVal = "node-circle" + (eq&&eq!=="Eliminado"?" active":"") + (isF?" frontier-spark":"");
          let oI = g.querySelector('image'), oT = g.querySelector('text'); if(oI) oI.remove(); if(oT) oT.remove();

          if(ES_ADMIN && eq && eq !== "Eliminado") {
            g.onclick = async () => {
              let g1 = prompt(`Goles de ${eq}:`, "0"), g2 = prompt("Goles del rival:", "0"); if(g1===null||g2===null) return;
              let rA = await enviarAccion({ accion: 'avanzarManual', partidoId: r+'_'+Math.floor(i/2), g1: g1, g2: g2, equipoAvanza: eq });
              if(rA) { DATA = rA; dibujarBracket(); renderizarPartidos(); }
            };
          } else g.onclick = null;

          if(eq && eq !== "Eliminado") {
            let nl = eq.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s.-]/g, '').trim(); let fc = FLAG_MAP[nl];
            if(fc) { let img = document.createElementNS("http://www.w3.org/2000/svg", "image"); img.setAttribute("href", `https://flagcdn.com/w40/${fc}.png`); img.setAttribute("x", -rad); img.setAttribute("y", -rad); img.setAttribute("width", rad*2); img.setAttribute("height", rad*2); img.setAttribute("preserveAspectRatio", "xMidYMid slice"); img.setAttribute("clip-path", "url(#cp)"); img.style.pointerEvents = "none"; g.appendChild(img); }
            let t = document.createElementNS("http://www.w3.org/2000/svg", "text"); t.setAttribute("x", 0); t.setAttribute("y", rad+12); t.setAttribute("text-anchor", "middle"); t.setAttribute("class", "node-text"); t.textContent = nl; g.appendChild(t);
          }
        }
      });
    }
  </script>
</body>
</html>
