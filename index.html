<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quiniela Mundial 2026</title>
  <style>
    :root { 
      --accent: #00f2fe; 
      --text-main: #f8fafc;
      --glass-bg: rgba(15, 23, 42, 0.35);
      --glass-border: rgba(255, 255, 255, 0.08);
    }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: linear-gradient(135deg, #020024 0%, #090979 40%, #0072ff 100%);
      background-attachment: fixed;
      color: var(--text-main); 
      margin: 0; 
      padding: 15px; 
      overflow-x: hidden;
    }
    
    .header-bar { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; text-align: center;}
    .header-bar h1 { margin: 0; font-size: 30px; font-weight: 800; text-shadow: 0 4px 15px rgba(0,0,0,0.6); }
    
    .secret-btn { cursor: pointer; transition: transform 0.2s; display: inline-block; filter: drop-shadow(0 2px 8px rgba(0,242,254,0.4)); }
    .secret-btn:hover { transform: scale(1.1); }

    .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 25px; }
    .top-layout { display: flex; flex-direction: column; gap: 20px; width: 100%; }
    @media (min-width: 1024px) { .top-layout { flex-direction: row; align-items: flex-start; } }

    .glass-panel { 
      background: var(--glass-bg); 
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); 
      border-radius: 16px; 
      padding: 20px; width: 100%; box-sizing: border-box; 
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .sidebar { display: none; width: 100%; }
    @media (min-width: 1024px) { .sidebar { max-width: 340px; } }
    .admin-controls-active { display: block !important; }
    
    .bracket-panel { flex: 1 1 auto; min-height: 600px; display: flex; flex-direction: column; overflow: hidden; padding: 0 !important; background: transparent !important; border: none !important; box-shadow: none !important;}
    .svg-wrapper { width: 100%; flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
    svg { width: 100%; height: 100%; max-height: 85vh; display: block; margin: 0 auto; transition: all 0.5s ease-in-out; }
    
    input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15,23,42,0.6); color: white; box-sizing: border-box; font-size: 15px;}
    input:focus { border-color: var(--accent); outline: none; }
    
    button { background: var(--accent); color: #0f172a; border: none; padding: 12px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1 1 100%; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);}
    button:hover { filter: brightness(1.2); transform: translateY(-1px); }
    .btn-danger { background: #ef4444; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); color: white;}
    
    ul.player-list { list-style: none; padding: 0; max-height: 250px; overflow-y: auto;}
    ul.player-list li { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; font-size: 14px;}
    
    .del-btn { background: transparent; color: #ef4444; border: 1px solid #ef4444; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; flex: 0 0 auto; box-shadow: none;}

    /* MODALES FLOTANTES */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2,0,36,0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);}
    .modal-box { background: #0f172a; padding: 25px; border-radius: 16px; width: 92%; max-width: 380px; border: 1px solid rgba(255,255,255,0.1); color: white; box-shadow: 0 0 35px rgba(0,242,254,0.15);}
    .modal-box h3 { margin-top: 0; color: var(--accent); font-size: 20px; }
    .warning-box { background: rgba(239, 68, 68, 0.1); border-left: 4px solid #ef4444; padding: 10px; margin-bottom: 15px; font-size: 13px; border-radius: 0 8px 8px 0; }
    .pool-box { background: rgba(0, 242, 254, 0.08); border-left: 4px solid var(--accent); padding: 10px; margin-bottom: 15px; font-size: 13px; border-radius: 0 8px 8px 0; }

    /* ========================================= */
    /* ANIMACIÓN LIQUIDA FLUIDA DE LOS RAYOS      */
    /* ========================================= */
    .node-link { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 2.5; transition: d 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    .node-link.active { 
      stroke: var(--accent); stroke-width: 4.5; stroke-linecap: round; 
      stroke-dasharray: 30 10; /* Trazos largos simulando flujo continuo de agua */
      animation: fluidFlow 0.3s linear infinite; /* Alta velocidad, movimiento orgánico */
      filter: drop-shadow(0px 0px 8px var(--accent)); 
    }
    @keyframes fluidFlow { from { stroke-dashoffset: 40; } to { stroke-dashoffset: 0; } }
    
    .node-group { transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    .node-circle { fill: #111827; stroke: rgba(255,255,255,0.2); stroke-width: 2; transition: transform 0.2s, stroke 0.3s; }
    .node-circle.active { stroke: var(--accent); fill: #030712; stroke-width: 3; }
    
    /* EQUIPOS ELIMINADOS EN BLANCO Y NEGRO TENUE */
    .eliminated-node { opacity: 0.35; filter: grayscale(100%) contrast(85%); transition: all 0.6s ease; }

    .frontier-spark { stroke: #ffffff !important; fill: #111827 !important; animation: sparkImpact 1.2s infinite alternate ease-in-out; }
    @keyframes sparkImpact { 0% { filter: drop-shadow(0 0 4px var(--accent)); transform: scale(1.08); } 100% { filter: drop-shadow(0 0 18px var(--accent)) drop-shadow(0 0 8px #ffffff); transform: scale(1.25); } }
    .glowing-champion { animation: lightningGlow 2.5s infinite ease-in-out; }
    @keyframes lightningGlow { 0% { filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.5)); } 50% { filter: drop-shadow(0 0 35px var(--accent)) drop-shadow(0 0 15px #fff); transform: scale(1.04); } 100% { filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.5)); } }
    
    .admin-mode .node-group { cursor: pointer; }
    .node-text { font-weight: 700; pointer-events: none; font-family: sans-serif; fill: #f1f5f9; letter-spacing: -0.3px;}
    
    /* GRILLA DE PARTIDOS Y BOLSAS */
    .grid-matches { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 15px; }
    .match-card { padding: 15px; border-radius: 12px; background: rgba(15,23,42,0.5); border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; justify-content: space-between; }
    .match-teams { display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 15px; margin-bottom: 10px; }
    .match-info { display: flex; justify-content: space-between; font-size: 12px; color: #94a3b8; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; }
    .match-info b { color: var(--accent); font-size: 13px; }
  </style>
</head>
<body>

  <div class="header-bar">
    <h1><span class="secret-btn" onclick="triggerAuth()">🏆</span> Quiniela Mundial 2026</h1>
    <div style="margin-top: 12px; display:flex; gap:8px; max-width:400px; width:100%;" id="phoneRequestBox">
      <input type="text" id="reqPhone" placeholder="Ej: 5213334874026" style="margin:0; padding:10px; font-size:14px;">
      <button onclick="solicitarCodigoWhatsApp()" style="flex:0 0 auto; padding:10px 14px; font-size:13px;">📲 Recibir Código</button>
    </div>
  </div>

  <div class="container" id="mainContainer">
    <div class="loader" id="loader">Canalizando flujo de datos...</div>
  </div>

  <div class="modal-overlay" id="authModal">
    <div class="modal-box" id="modalDynamicContent"></div>
  </div>

  <script>
    // PEGA AQUÍ TU URL DE PUBLICACIÓN
    const API_URL = "https://script.google.com/macros/s/AKfycbyizNP6mZogEqYC_2TiZSz7BT30G5QTNZw3dD-siePBX3chUzAfHyZEFNItniT4ktg4/exec"; 
    
    let ES_ADMIN = false; let DATA = null; let CODIGO_SESION = null;

    const FLAG_MAP = {
      "Brasil": "br", "Japón": "jp", "Costa de Marfil": "ci", "Noruega": "no",
      "México": "mx", "Ecuador": "ec", "Inglaterra": "gb-eng", "RD Congo": "cd",
      "Argentina": "ar", "Cabo Verde": "cv", "Australia": "au", "Egipto": "eg",
      "España": "es", "Canadá": "ca", "Francia": "fr", "Alemania": "de"
    };

    window.onload = () => { cargarDatosIniciales(); window.addEventListener('resize', () => { if(DATA) dibujarBracket(); }); };

    async function cargarDatosIniciales() {
      try {
        let respuesta = await fetch(API_URL, { redirect: 'follow' });
        DATA = await respuesta.json(); construirInterfaz(); renderizarDatos();
      } catch (error) { document.getElementById('loader').innerText = "Fallo de conexión."; }
    }

    async function enviarAccion(payload) {
      document.body.style.cursor = 'wait';
      let respuesta = await fetch(API_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload), redirect: 'follow' });
      let nuevaData = await respuesta.json(); document.body.style.cursor = 'default';
      return nuevaData;
    }

    async function solicitarCodigoWhatsApp() {
      let tel = document.getElementById('reqPhone').value.trim();
      if(!tel) return alert("Ingresa tu número con clave de país.");
      let res = await enviarAccion({ accion: 'solicitarCodigo', telefono: tel });
      alert(res.msg);
    }

    async function triggerAuth() {
      let code = prompt("Introduce tu Código único o PIN de Admin:");
      if(!code) return;
      let res = await enviarAccion({ accion: 'validarCodigo', codigo: code.toUpperCase().trim() });
      
      if (res && res.valido) {
        CODIGO_SESION = res.codigo;
        if (res.tipo === 'admin') {
          ES_ADMIN = true; document.getElementById('sidebarAdmin').classList.add('admin-controls-active');
          document.getElementById('svgContainer').classList.add('admin-mode'); dibujarBracket();
        } else if (res.tipo === 'user' && res.modo === 'registro') {
          openModalRegistro();
        } else if (res.tipo === 'user' && res.modo === 'quiniela') {
          openModalPrediccion(res.apodo);
        }
      } else { alert(res.error || "Código no válido."); }
    }

    function openModalRegistro() {
      let content = document.getElementById('modalDynamicContent');
      content.innerHTML = `
        <h3>🎟️ Formulario de Inscripción</h3>
        <div class="warning-box">La inscripción para el sorteo de equipos tiene un costo de <b>$50 MXN</b>.</div>
        <input type="text" id="regNombre" placeholder="Nombre completo">
        <input type="text" id="regApodo" placeholder="Nickname / Apodo">
        <button onclick="finalizarRegistro()">Confirmar Registro</button>
        <button onclick="cerrarModal()" style="background:transparent; color:white; margin-top:8px; box-shadow:none;">Cerrar</button>
      `;
      document.getElementById('authModal').style.display = 'flex';
    }

    function openModalPrediccion(apodo) {
      let content = document.getElementById('modalDynamicContent');
      let options = DATA.partidos.map(p => `<option value="${p.id}">${p.eq1} vs ${p.eq2}</option>`).join('');
      content.innerHTML = `
        <h3>⚽ Pronosticar Marcador</h3>
        <p style="font-size:13px; color:#cbd5e1;">Hola <b>${apodo}</b>. Ingresa tu predicción.</p>
        <div class="pool-box">Costo: <b>$30 MXN</b>. Si aciertas el marcador exacto, te llevas el acumulado total del partido.</div>
        <select id="predPartidoId">${options}</select>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
          <input type="number" id="predG1" placeholder="Goles Eq 1" style="margin:0;">
          <input type="number" id="predG2" placeholder="Goles Eq 2" style="margin:0;">
        </div>
        <button onclick="finalizarPrediccion()">Enviar Pronóstico y Apostar</button>
        <button onclick="cerrarModal()" style="background:transparent; color:white; margin-top:8px; box-shadow:none;">Cerrar</button>
      `;
      document.getElementById('authModal').style.display = 'flex';
    }

    function cerrarModal() { document.getElementById('authModal').style.display = 'none'; }

    async function finalizarRegistro() {
      let n = document.getElementById('regNombre').value.trim();
      let a = document.getElementById('regApodo').value.trim();
      if(!n || !a) return alert("Completa los datos.");
      let res = await enviarAccion({ accion: 'registrarUsuario', datos: { nombre: n, apodo: a, codigo: CODIGO_SESION } });
      if(res) { DATA = res; cerrarModal(); renderizarDatos(); alert("¡Inscrito! Espera el sorteo de equipos."); }
    }

    async function finalizarPrediccion() {
      let pId = document.getElementById('predPartidoId').value;
      let g1 = document.getElementById('predG1').value;
      let g2 = document.getElementById('predG2').value;
      if(g1 === "" || g2 === "") return alert("Ingresa los goles.");
      
      try {
        let res = await enviarAccion({ accion: 'guardarPrediccion', codigo: CODIGO_SESION, partidoId: pId, goles1: g1, goles2: g2 });
        if(res.error) throw new Error(res.error);
        DATA = res; cerrarModal(); renderizarDatos(); alert("¡Pronóstico guardado y $30 agregados al pozo!");
      } catch(e) { alert(e.message); }
    }

    async function eliminarJugador(nombre) {
      if(confirm(`¿Eliminar a ${nombre}?`)) {
        let res = await enviarAccion({ accion: 'eliminarJugador', nombre: nombre });
        if(res) { DATA = res; renderizarDatos(); }
      }
    }

    async function cerrarQuiniela() {
      if(confirm("¿Sortear los 16 equipos?")) {
        let res = await enviarAccion({ accion: 'cerrar', equipos: DATA.equiposIniciales });
        if(res) { DATA = res; renderizarDatos(); }
      }
    }

    function construirInterfaz() {
      const container = document.getElementById('mainContainer');
      container.innerHTML = `
        <div class="top-layout">
          <div class="sidebar glass-panel" id="sidebarAdmin">
            <h3 style="margin-top:0; text-align:center; color:var(--accent);">🛠 Panel Control</h3>
            <button class="btn-danger" id="btnCerrar" onclick="cerrarQuiniela()">🔒 Ejecutar Sorteo Aleatorio</button>
            <hr style="border:0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">
            <h4 style="margin: 0 0 10px 0;">Inscritos (<span id="numJugadores">0</span>)</h4>
            <ul id="listaJugadores" class="player-list"></ul>
          </div>
          <div class="bracket-panel">
            <div class="svg-wrapper" id="svgContainer"><svg id="bracketSvg" viewBox="0 0 1000 1000"></svg></div>
          </div>
        </div>
        <div class="glass-panel">
          <h3 style="margin-top:0; color:var(--accent);">⚽ Escrutinio de Partidos y Bolsas Acumuladas</h3>
          <div id="gridMatches" class="grid-matches"></div>
        </div>
      `;
      if(ES_ADMIN) { document.getElementById('sidebarAdmin').classList.add('admin-controls-active'); document.getElementById('svgContainer').classList.add('admin-mode'); }
    }

    function renderizarDatos() {
      document.getElementById('numJugadores').innerText = DATA.jugadores.length;
      document.getElementById('listaJugadores').innerHTML = DATA.jugadores.map(j => `
        <li>
          <span>👤 ${j.nombre}</span> 
          <div style="display:flex; gap:10px; align-items:center;">
            <small>${j.equipos.length ? 'Asignado' : 'Pendiente'}</small>
            ${ES_ADMIN ? `<button class="del-btn" onclick="eliminarJugador('${j.nombre}')">Eliminar</button>` : ''}
          </div>
        </li>
      `).join('');
      
      if(DATA.estado === 'Cerrada' && document.getElementById('btnCerrar')) {
        document.getElementById('btnCerrar').innerText = "Sorteo Completado ✅";
        document.getElementById('btnCerrar').disabled = true;
      }

      dibujarBracket();

      // RENDERIZAR LA GRILLA DE BOLSAS ACUMULADAS Y MARCADORES ABAJO
      let gridM = document.getElementById('gridMatches');
      gridM.innerHTML = DATA.partidos.map(p => {
        let marcadorReal = (p.g1 !== "") ? `<b>${p.g1} - ${p.g2}</b>` : `<span style="color:rgba(255,255,255,0.3)">Vs</span>`;
        let horaLegible = new Date(p.fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        // Encontrar ganadores de esta bolsa
        let ganadoresPart = DATA.predicciones.filter(pr => pr.partidoId === p.id && pr.premio === 'Ganador');
        let txtGanadores = ganadoresPart.length 
          ? `<div style="color:#10b981; font-size:11px; mt:5px;">🎉 Ganadores: ${ganadoresPart.map(g => {
              let j = DATA.jugadores.find(jug => jug.codigo === g.codigo);
              return j ? j.apodo : "Anónimo";
            }).join(', ')}</div>` 
          : '';

        return `
          <div class="match-card">
            <div class="match-teams">
              <span>${p.eq1}</span> ${marcadorReal} <span>${p.eq2}</span>
            </div>
            <div class="match-info">
              <span>Hora: ${horaLegible}</span>
              <span>Bolsa: <b>$${p.bolsa} MXN</b></span>
            </div>
            ${txtGanadores}
          </div>
        `;
      }).join('');
    }

    function dibujarBracket() {
      const svg = document.getElementById('bracketSvg'); const isMobile = window.innerWidth <= 850;
      svg.setAttribute("viewBox", isMobile ? "0 0 750 900" : "0 0 1000 1000");

      if (!document.getElementById('pathLayer')) {
        svg.innerHTML = `<defs><clipPath id="circle-clip" clipPathUnits="objectBoundingBox"><circle cx="0.5" cy="0.5" r="0.5"></circle></clipPath></defs><g id="pathLayer"></g><g id="nodeLayer"></g><g id="championGroup"></g>`;
      }

      let pathLayer = document.getElementById('pathLayer'); let nodeLayer = document.getElementById('nodeLayer'); let champGroup = document.getElementById('championGroup');
      const CX = 500, CY = 500;
      const radios = { R1: 410, R2: 295, R3: 180, R4: 75 };
      const slots = { R1: 16, R2: 8, R3: 4, R4: 2 };
      const rondas = Object.keys(slots);

      let coords = {};
      rondas.forEach(r => {
        for(let i=0; i<slots[r]; i++) {
          let x, y;
          if (!isMobile) {
            let ang = (i * 2 * Math.PI) / slots[r] - Math.PI/2;
            x = CX + radios[r] * Math.cos(ang); y = CY + radios[r] * Math.sin(ang);
          } else {
            let isLeft = i < (slots[r] / 2);
            if (r === 'R1') { x = isLeft ? 50 : 700; y = 80 + (isLeft ? i : i - 8) * 98; }
            else {
              let prevR = rondas[rondas.indexOf(r) - 1];
              let c1 = coords[prevR + '_' + (i*2)]; let c2 = coords[prevR + '_' + (i*2+1)];
              let offset = { 'R2': 150, 'R3': 250, 'R4': 320 }[r];
              x = isLeft ? offset : 750 - offset; y = (c1.y + c2.y) / 2;
            }
          }
          coords[r + '_' + i] = {x, y};
        }
      });

      // CONECTORES FLUJO DE AGUA
      for (let r = 0; r < rondas.length - 1; r++) {
        let rAct = rondas[r], rSig = rondas[r+1];
        for (let i = 0; i < slots[rAct]; i++) {
          let p1 = coords[rAct + '_' + i]; let p2 = coords[rSig + '_' + Math.floor(i/2)]; let pM;
          if (!isMobile) {
            let rMedio = (radios[rAct] + radios[rSig]) / 2; let ang1 = (i * 2 * Math.PI) / slots[rAct] - Math.PI/2;
            pM = { x: CX + rMedio * Math.cos(ang1), y: CY + rMedio * Math.sin(ang1) };
          } else { pM = { x: p2.x, y: p1.y }; }

          let pathId = `link_${rAct}_${i}`; let path = document.getElementById(pathId);
          if (!path) { path = document.createElementNS("http://www.w3.org/2000/svg", "path"); path.id = pathId; path.setAttribute("class", "node-link"); pathLayer.appendChild(path); }
          
          let eqO = DATA.bracket[rAct + '_' + i]; let eqD = DATA.bracket[rSig + '_' + Math.floor(i/2)];
          if(eqO && eqO !== "Eliminado" && eqO === eqD) path.classList.add('active'); else path.classList.remove('active');
          path.setAttribute("d", `M ${p1.x} ${p1.y} L ${pM.x} ${pM.y} L ${p2.x} ${p2.y}`);
        }
      }

      // NODOS Y FRONTERAS
      rondas.forEach(r => {
        let radioCirculo = isMobile ? 22 : 20;
        for(let i=0; i<slots[r]; i++) {
          let pos = coords[r + '_' + i]; let equipo = DATA.bracket[r + '_' + i] || "";
          let isFrontier = false, isEliminated = false;
          
          if (equipo && equipo !== "Eliminado") {
            let proxR = { R1:'R2', R2:'R3', R3:'R4', R4:'Campeon' }[r];
            let proxSlot = (proxR === 'Campeon') ? 0 : Math.floor(i/2);
            let equipoSiguiente = DATA.bracket[proxR + '_' + proxSlot];
            if (!equipoSiguiente) isFrontier = true;
            else if (equipoSiguiente !== equipo && equipoSiguiente !== "Eliminado") isEliminated = true;
          }

          let groupId = `node_${r}_${i}`; let g = document.getElementById(groupId);
          if (!g) {
            g = document.createElementNS("http://www.w3.org/2000/svg", "g"); g.id = groupId; g.setAttribute("class", "node-group");
            let c = document.createElementNS("http://www.w3.org/2000/svg", "circle"); c.setAttribute("cx", 0); c.setAttribute("cy", 0); c.setAttribute("class", "node-circle"); g.appendChild(c); nodeLayer.appendChild(g);
          }
          
          let c = g.querySelector('.node-circle'); c.setAttribute("r", radioCirculo); g.setAttribute("transform", `translate(${pos.x}, ${pos.y})`);
          g.className.baseVal = "node-group" + (isEliminated ? " eliminated-node" : ""); c.className.baseVal = "node-circle";
          
          if(equipo && equipo !== "Eliminado") { c.classList.add("active"); if (isFrontier) c.classList.add("frontier-spark"); }

          let oldImg = g.querySelector('image'); let oldText = g.querySelector('text');
          if (oldImg) oldImg.remove(); if (oldText) oldText.remove();

          if(ES_ADMIN && equipo && equipo !== "Eliminado") {
            g.onclick = async () => {
              let g1 = prompt("Goles de " + equipo + ":", "0");
              let g2 = prompt("Goles del rival:", "0");
              if (g1 === null || g2 === null) return;
              let prox = { R1:'R2', R2:'R3', R3:'R4', R4:'Campeon' }[r];
              let res = await enviarAccion({ accion: 'avanzarManual', ronda: prox, slot: Math.floor(i/2), equipo: equipo, goles1: g1, goles2: g2 });
              if(res) { DATA = res; renderizarDatos(); }
            };
          } else { g.onclick = null; }

          if(equipo && equipo !== "Eliminado") {
            let nombreLimpio = equipo.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s.-]/g, '').trim(); let flagCode = FLAG_MAP[nombreLimpio];
            if(flagCode) {
              let img = document.createElementNS("http://www.w3.org/2000/svg", "image"); img.setAttribute("href", `https://flagcdn.com/w40/${flagCode}.png`);
              img.setAttribute("x", -radioCirculo); img.setAttribute("y", -radioCirculo); img.setAttribute("width", radioCirculo * 2); img.setAttribute("height", radioCirculo * 2);
              img.setAttribute("preserveAspectRatio", "xMidYMid slice"); img.setAttribute("clip-path", "url(#circle-clip)"); img.style.pointerEvents = "none"; g.appendChild(img);
            }
            let tNombre = document.createElementNS("http://www.w3.org/2000/svg", "text");
            tNombre.setAttribute("x", 0); tNombre.setAttribute("y", radioCirculo + 15); tNombre.setAttribute("text-anchor", "middle"); tNombre.setAttribute("class", "node-text");
            tNombre.setAttribute("font-size", "11px"); tNombre.textContent = nombreLimpio; g.appendChild(tNombre);
          }
        }
      });

      // CAMPEÓN
      let camp = DATA.bracket['Campeon_0'];
      let campX = isMobile ? 375 : CX; let campY = isMobile ? coords['R4_0'].y : CY;
      champGroup.setAttribute("transform", `translate(${campX}, ${campY})`); champGroup.innerHTML = '';

      if (camp) {
         let nombreLimpio = camp.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s.-]/g, '').trim(); let flagCode = FLAG_MAP[nombreLimpio];
         let d = DATA.jugadores.find(j => j.equipos.includes(camp)); let dueno = d ? d.apodo : "S/A";
         champGroup.setAttribute("class", "node-group glowing-champion");
         let circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
         circle.setAttribute("cx", 0); circle.setAttribute("cy", -15); circle.setAttribute("r", 40); circle.setAttribute("fill", "#0f172a"); circle.setAttribute("stroke", "var(--accent)"); circle.setAttribute("stroke-width", "3.5"); champGroup.appendChild(circle);
         if(flagCode) {
           let img = document.createElementNS("http://www.w3.org/2000/svg", "image"); img.setAttribute("href", `https://flagcdn.com/w80/${flagCode}.png`);
           img.setAttribute("x", -34); img.setAttribute("y", -49); img.setAttribute("width", 68); img.setAttribute("height", 68); img.setAttribute("preserveAspectRatio", "xMidYMid slice"); img.setAttribute("clip-path", "url(#circle-clip)"); champGroup.appendChild(img);
         }
         let tNombre = document.createElementNS("http://www.w3.org/2000/svg", "text"); tNombre.setAttribute("x", 0); tNombre.setAttribute("y", 45); tNombre.setAttribute("text-anchor", "middle"); tNombre.setAttribute("font-size", "16"); tNombre.setAttribute("font-weight", "bold"); tNombre.setAttribute("fill", "white"); tNombre.textContent = nombreLimpio; champGroup.appendChild(tNombre);
         let tDueno = document.createElementNS("http://www.w3.org/2000/svg", "text"); tDueno.setAttribute("x", 0); tDueno.setAttribute("y", 65); tDueno.setAttribute("text-anchor", "middle"); tDueno.setAttribute("font-size", "14"); tDueno.setAttribute("fill", "var(--accent)"); tDueno.setAttribute("font-weight", "bold"); tDueno.textContent = "🥇 Ganador: " + dueno; champGroup.appendChild(tDueno);
      } else {
         champGroup.setAttribute("class", "node-group");
         let tTrofeo = document.createElementNS("http://www.w3.org/2000/svg", "text"); tTrofeo.setAttribute("x", 0); tTrofeo.setAttribute("y", -5); tTrofeo.setAttribute("text-anchor", "middle"); tTrofeo.setAttribute("font-size", "45"); tTrofeo.textContent = "🏆"; champGroup.appendChild(tTrofeo);
         let tEspera = document.createElementNS("http://www.w3.org/2000/svg", "text"); tEspera.setAttribute("x", 0); tEspera.setAttribute("y", 30); tEspera.setAttribute("text-anchor", "middle"); tEspera.setAttribute("font-size", "14"); tEspera.setAttribute("fill", "rgba(255,255,255,0.4)"); tEspera.setAttribute("font-weight", "bold"); tEspera.textContent = "Esperando Campeón"; champGroup.appendChild(tEspera);
      }
    }
  </script>
</body>
</html>
