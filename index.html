<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quiniela Premium 2026</title>
  <style>
    :root { var(--accent): #00f2fe; var(--bg-dark): #020024; var(--glass-bg): rgba(15, 23, 42, 0.45); }
    body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #020024 0%, #090979 40%, #0072ff 100%); background-attachment: fixed; color: #f8fafc; margin: 0; padding: 10px 10px 80px 10px; overflow-x: hidden; }
    h1 { text-align: center; font-size: 26px; text-shadow: 0 4px 15px rgba(0,0,0,0.6); margin-bottom: 20px;}
    .secret-btn { cursor: pointer; filter: drop-shadow(0 2px 8px rgba(0,242,254,0.4)); transition: transform 0.2s; display: inline-block;}
    .secret-btn:active { transform: scale(0.8); }
    .tab-content { display: none; animation: fadeIn 0.4s; width: 100%; max-width: 1200px; margin: 0 auto;}
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(2,0,36,0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; }
    .nav-item { color: rgba(255,255,255,0.4); text-align: center; font-size: 12px; cursor: pointer; flex: 1; font-weight: bold; transition: 0.3s;}
    .nav-item.active { color: #00f2fe; text-shadow: 0 0 10px rgba(0,242,254,0.5); }
    .nav-item i { display: block; font-size: 20px; margin-bottom: 4px; }
    .glass-panel { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; width: 100%; box-sizing: border-box; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3); margin-bottom: 20px;}
    button { background: #00f2fe; color: #0f172a; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3); width: 100%;}
    button:hover { filter: brightness(1.2); }
    .btn-secondary { background: rgba(0,242,254,0.1); border: 1px solid #00f2fe; color: #00f2fe; box-shadow: none; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15,23,42,0.6); color: white; box-sizing: border-box;}
    input:focus { border-color: #00f2fe; outline: none; }
    .loader { text-align: center; width: 100%; padding: 40px; color: #00f2fe; font-style: italic; display: none; }
    .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(2,0,36,0.85); z-index: 200; justify-content: center; align-items: center; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
    .modal-box { background: #0f172a; padding: 25px; border-radius: 16px; width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); color: white; box-shadow: 0 0 35px rgba(0,242,254,0.15);}
    .warning-box { background: rgba(239, 68, 68, 0.1); border-left: 4px solid #ef4444; padding: 10px; margin-bottom: 15px; font-size: 13px; border-radius: 0 8px 8px 0; }
    .svg-wrapper { width: 100%; display: flex; justify-content: center; align-items: center; padding-top: 10px;}
    svg { width: 100%; height: auto; max-height: 85vh; display: block; margin: 0 auto; transition: all 0.5s ease-in-out; }
    .node-link { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 2.5; transition: d 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    .node-link.active { stroke: #00f2fe; stroke-width: 4.5; stroke-linecap: round; stroke-dasharray: 25 8; animation: fluidFlow 0.4s linear infinite; filter: drop-shadow(0px 0px 6px #00f2fe); }
    @keyframes fluidFlow { from { stroke-dashoffset: 33; } to { stroke-dashoffset: 0; } }
    .node-group { transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    .node-circle { fill: #111827; stroke: rgba(255,255,255,0.2); stroke-width: 2; transition: transform 0.2s, stroke 0.3s; }
    .node-circle.active { stroke: #00f2fe; fill: #030712; stroke-width: 3; }
    .eliminated-node { opacity: 0.35; filter: grayscale(100%); transition: all 0.5s ease; }
    .frontier-spark { stroke: #ffffff !important; fill: #111827 !important; animation: sparkImpact 1.2s infinite alternate ease-in-out; }
    @keyframes sparkImpact { 0% { filter: drop-shadow(0 0 4px #00f2fe); transform: scale(1.1); } 100% { filter: drop-shadow(0 0 15px #00f2fe) drop-shadow(0 0 8px #ffffff); transform: scale(1.3); } }
    .glowing-champion { animation: lightningGlow 2.5s infinite ease-in-out; }
    @keyframes lightningGlow { 0% { filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.5)); transform: scale(1); } 50% { filter: drop-shadow(0 0 35px #00f2fe) drop-shadow(0 0 15px rgba(255, 255, 255, 0.8)); transform: scale(1.05); } 100% { filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.5)); transform: scale(1); } }
    .admin-mode .node-group { cursor: pointer; }
    .admin-mode .node-group:not(.eliminated-node):hover .node-circle { transform: scale(1.2); stroke: white; }
    .node-text { font-size: 10px; font-weight: 700; pointer-events: none; font-family: sans-serif; fill: white;}
    .grid-matches { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
    .match-card { background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 15px; }
    .match-title { display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; margin-bottom: 5px;}
    .match-date { font-size: 11px; color: #94a3b8; text-align: center; margin-bottom: 15px; }
    .wdl-group { display: flex; gap: 5px; margin-bottom: 5px; }
    .wdl-btn { flex: 1; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 6px; font-size: 13px; text-align: center; cursor: pointer; transition: 0.2s;}
    .wdl-btn:hover { background: rgba(0,242,254,0.15); border-color: #00f2fe; }
    .wdl-stats { font-size: 10px; color: #00f2fe; margin-top: 4px; display: block;}
    .profile-stat { background: rgba(0,242,254,0.05); border: 1px solid rgba(0,242,254,0.3); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 15px;}
    .profile-stat h2 { margin: 0; font-size: 28px; color: #00f2fe; }
    .profile-stat small { color: #94a3b8; font-size: 12px; }
    .empty-state { text-align: center; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 8px; border: 1px dashed rgba(255,255,255,0.2); margin-top: 10px;}
  </style>
</head>
<body>

  <!-- CABECERA -->
  <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 20px; position:relative;">
    <div style="flex:1;"></div>
    <h1 style="margin:0; flex:2; text-align:center; font-size: 26px; text-shadow: 0 4px 15px rgba(0,0,0,0.6);">
      <span class="secret-btn" onclick="triggerAuth()">🏆</span> Quiniela 2026
    </h1>
    <div style="flex:1; text-align:right; padding-top: 5px;">
      <button id="btnGlobalLogout" onclick="cerrarSesionGlobal()" style="display:none; width:auto; padding:8px 12px; font-size:11px; background:rgba(239, 68, 68, 0.15); border:1px solid #ef4444; color:#f8fafc; border-radius:8px; box-shadow:none; cursor:pointer; transition:0.3s;">❌ Cerrar</button>
    </div>
  </div>

  <div class="loader" id="loader">Cargando base de datos global...</div>

  <!-- PESTAÑA 1 -->
  <div id="tab-bracket" class="tab-content active">
    <div class="glass-panel" style="padding:0; overflow:hidden;">
      <div class="svg-wrapper" id="svgContainer"><svg id="bracketSvg" viewBox="0 0 1000 1000"></svg></div>
    </div>
  </div>

  <!-- PESTAÑA 2 -->
  <div id="tab-matches" class="tab-content">
    <div class="glass-panel">
      <h3 style="margin-top:0; color:#00f2fe; text-align:center;">⚽ Pronósticos ($30 MXN)</h3>
      <p style="font-size:12px; text-align:center; color:#cbd5e1; margin-bottom: 20px;">Cierre automático al inicio de cada partido.</p>
      <div id="matchesList" class="grid-matches"></div>
    </div>
  </div>

  <!-- PESTAÑA 3 -->
  <div id="tab-profile" class="tab-content">
    <div class="glass-panel" id="profileLogin">
      <h3 style="text-align:center;">👤 Mi Perfil</h3>
      <p style="font-size:13px; color:#cbd5e1; text-align:center; margin-bottom:20px;">Ingresa tu código único de 6 dígitos.</p>
      <input type="text" id="perfilCode" placeholder="Ingresa tu código" style="text-transform: uppercase; text-align:center; font-size:18px; letter-spacing: 2px;">
      <button onclick="cargarPerfilClick()">Ingresar</button>
      
      <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin: 30px 0 20px 0;">
      <h4 style="text-align:center; color:#94a3b8; margin: 0 0 10px 0;">¿Aún no tienes código?</h4>
      <input type="text" id="reqPhone" placeholder="Tu número telefónico">
      <button onclick="solicitarCodigoWhatsApp()" class="btn-secondary">📲 Generar mi Código de Acceso</button>
    </div>
    <div class="glass-panel" id="profileData" style="display:none;"></div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" id="nav-bracket" onclick="switchTab('tab-bracket', this)"><i>🏆</i>Mundialista</div>
    <div class="nav-item" id="nav-matches" onclick="switchTab('tab-matches', this)"><i>⚽</i>Apuestas</div>
    <div class="nav-item" id="nav-profile" onclick="switchTab('tab-profile', this)"><i>👤</i>Mi Perfil</div>
  </div>

  <div class="modal-overlay" id="authModal"><div class="modal-box" id="modalDynamic"></div></div>

  <script>
    // ==========================================
    // ¡PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT!
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbyizNP6mZogEqYC_2TiZSz7BT30G5QTNZw3dD-siePBX3chUzAfHyZEFNItniT4ktg4/exec"; 
    
    let DATA = null; let CODIGO_ACTIVO = null; let ES_ADMIN = false;

    const FLAG_MAP = {
      "Sudáfrica": "za", "Canadá": "ca", "Países Bajos": "nl", "Marruecos": "ma", "Francia": "fr", "Suecia": "se", "Alemania": "de", "Paraguay": "py", "Brasil": "br", "Japón": "jp", "Costa de Marfil": "ci", "Noruega": "no", "México": "mx", "Ecuador": "ec", "Inglaterra": "gb-eng", "RD Congo": "cd", "Bélgica": "be", "Senegal": "sn", "EE.UU.": "us", "Bosnia": "ba", "España": "es", "Austria": "at", "Portugal": "pt", "Croacia": "hr", "Suiza": "ch", "Argelia": "dz", "Australia": "au", "Egipto": "eg", "Argentina": "ar", "Cabo Verde": "cv", "Colombia": "co", "Ghana": "gh"
    };

    window.onload = () => {
      document.getElementById('loader').style.display = 'block';
      cargarDatosIniciales();
      window.addEventListener('resize', () => { if(DATA) dibujarBracket(); });
    };

    async function cargarDatosIniciales() {
      try {
        let r = await fetch(API_URL, { redirect: 'follow' }); DATA = await r.json();
        document.getElementById('loader').style.display = 'none';
        if (DATA.error) { alert("Error DB: " + DATA.error); return; }
        dibujarBracket(); renderizarPartidos();
        if (CODIGO_ACTIVO) renderizarPerfilActivo();
      } catch (e) { document.getElementById('loader').innerText = "Fallo de conexión. Recarga."; }
    }

    function switchTab(tabId, el) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById(tabId).classList.add('active'); el.classList.add('active');
      if(tabId === 'tab-bracket' && DATA) dibujarBracket();
      if(tabId === 'tab-profile' && CODIGO_ACTIVO) renderizarPerfilActivo();
    }

    function actualizarBotonLogout() {
      let btn = document.getElementById('btnGlobalLogout');
      if (ES_ADMIN) { btn.style.display = 'inline-block'; btn.innerHTML = '❌ Admin'; } 
      else if (CODIGO_ACTIVO) { btn.style.display = 'inline-block'; btn.innerHTML = '❌ Salir'; } 
      else { btn.style.display = 'none'; }
    }

    function cerrarSesionGlobal() {
      ES_ADMIN = false; CODIGO_ACTIVO = null; document.getElementById('svgContainer').classList.remove('admin-mode');
      document.getElementById('perfilCode').value = ''; document.getElementById('profileLogin').style.display = 'block'; document.getElementById('profileData').style.display = 'none';
      actualizarBotonLogout(); dibujarBracket(); switchTab('tab-bracket', document.getElementById('nav-bracket'));
    }

    async function enviarAccion(payload) {
      document.body.style.cursor = 'wait';
      try { let r = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }); document.body.style.cursor = 'default'; return await r.json(); } 
      catch (e) { document.body.style.cursor = 'default'; return { error: "Error de red" }; }
    }

    async function solicitarCodigoWhatsApp() {
      let t = document.getElementById('reqPhone').value.trim(); 
      if(!t) return alert("Por favor ingresa tu número.");
      let r = await enviarAccion({ accion: 'solicitarCodigo', telefono: t }); 
      if(r && r.exito) alert("🎟️ TU CÓDIGO ÚNICO ES:  " + r.codigo + "  \n\nCópialo o anótalo muy bien.\nAhora toca el trofeo 🏆 del título e ingrésalo para inscribirte.");
      else if (r && r.msg) alert(r.msg);
    }

    async function triggerAuth() {
      let code = prompt("Introduce tu código de 6 dígitos o PIN:"); if(!code) return;
      let r = await enviarAccion({ accion: 'validarCodigo', codigo: code.toUpperCase().trim() });
      
      if(r.valido && r.tipo === 'admin') { 
        ES_ADMIN = true; document.getElementById('svgContainer').classList.add('admin-mode'); actualizarBotonLogout(); dibujarBracket(); 
      }
      else if(r.valido && r.modo === 'registro') { CODIGO_ACTIVO = code.toUpperCase().trim(); mostrarRegistroModal(); }
      else if (r.valido && r.modo === 'activo') { CODIGO_ACTIVO = code.toUpperCase().trim(); actualizarBotonLogout(); switchTab('tab-profile', document.getElementById('nav-profile')); }
      else alert(r.error || "Código no válido.");
    }

    function mostrarRegistroModal() {
      let html = `
        <h3 style="color:#00f2fe; margin-top:0;">🎫 Completar Inscripción</h3>
        <p style="font-size:13px; color:#cbd5e1; margin-bottom:15px;">Código verificado. Completa tus datos.</p>
        <div class="warning-box">La inscripción al sorteo mundialista tiene un costo de <b>$50 MXN</b> que se sumará a tu deuda.</div>
        <input type="text" id="rNom" placeholder="Tu Nombre Real">
        <input type="text" id="rApo" placeholder="Tu Nickname o Apodo">
        <button onclick="enviarRegistro()" style="margin-bottom:10px;">Confirmar Inscripción</button>
        <button onclick="cerrarModal()" style="background:transparent; border:1px solid rgba(255,255,255,0.2); color:white; box-shadow:none;">Cancelar</button>
      `;
      document.getElementById('modalDynamic').innerHTML = html; document.getElementById('authModal').style.display = 'flex';
    }

    async function enviarRegistro() {
      let n = document.getElementById('rNom').value.trim(); let a = document.getElementById('rApo').value.trim();
      if (!n || !a) return alert("Completa los campos.");
      let r = await enviarAccion({ accion: 'registrarUsuario', datos: { nombre: n, apodo: a, codigo: CODIGO_ACTIVO } });
      if(r && !r.error) { DATA = r; document.getElementById('authModal').style.display = 'none'; actualizarBotonLogout(); switchTab('tab-profile', document.getElementById('nav-profile')); }
    }

    function cerrarModal() { document.getElementById('authModal').style.display = 'none'; }

    function renderizarPartidos() {
      let html = ''; if(!DATA || !DATA.partidos) return;
      DATA.partidos.forEach(p => {
        if(p.g1 !== "") return; 
        let d = new Date(p.f); let hora = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); let fecha = d.toLocaleDateString();
        let st = p.stats || { gana1: 0, empate: 0, gana2: 0 };
        html += `
        <div class="match-card">
          <div class="match-date">📅 ${fecha} - ⏰ ${hora} (GDL)</div>
          <div class="match-title"><span>${p.eq1}</span> <span>vs</span> <span>${p.eq2}</span></div>
          <div style="font-size:12px; margin:15px 0 8px 0; color:#cbd5e1; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">Bolsa Pública Actual: <b style="color:#10b981;">$${p.bW || 0} MXN</b></div>
          <div class="wdl-group">
            <div class="wdl-btn" onclick="apostar('${p.id}', '1')">Gana Local <span class="wdl-stats">${st.gana1}%</span></div>
            <div class="wdl-btn" onclick="apostar('${p.id}', 'X')">Empate <span class="wdl-stats">${st.empate}%</span></div>
            <div class="wdl-btn" onclick="apostar('${p.id}', '2')">Gana Visita <span class="wdl-stats">${st.gana2}%</span></div>
          </div>
        </div>`;
      });
      document.getElementById('matchesList').innerHTML = html;
    }

    // EL FIX PRINCIPAL ESTÁ AQUÍ Y EN cargarPerfilClick
    async function apostar(pId, valWDL) {
      if(!CODIGO_ACTIVO) {
        let cod = prompt("Para hacer una apuesta de $30 MXN, ingresa tu código de 6 dígitos:");
        if(!cod) return;
        let r = await enviarAccion({ accion: 'validarCodigo', codigo: cod.toUpperCase().trim() });
        
        if(r.valido && r.modo === 'activo') { CODIGO_ACTIVO = cod.toUpperCase().trim(); actualizarBotonLogout(); } 
        else if (r.valido && r.modo === 'registro') { CODIGO_ACTIVO = cod.toUpperCase().trim(); return mostrarRegistroModal(); }
        else return alert(r.error || "Código no válido.");
      }
      
      let eq1 = DATA.partidos.find(x => x.id === pId).eq1; let eq2 = DATA.partidos.find(x => x.id === pId).eq2;
      let optStr = valWDL === '1' ? 'Gana Local' : (valWDL === '2' ? 'Gana Visita' : 'Empate');

      if(confirm(`Estás apostando $30 MXN al pronóstico: "${optStr}" para el partido ${eq1} vs ${eq2}.\nEsta cantidad se sumará a tu Deuda. ¿Confirmar?`)) {
        let r = await enviarAccion({ accion: 'apostarWDL', codigo: CODIGO_ACTIVO, partidoId: pId, prediccion: valWDL });
        if(r.error) alert(r.error); else { DATA = r; renderizarPartidos(); alert("¡Tu pronóstico ha sido registrado!"); }
      }
    }

    async function cargarPerfilClick() {
      let code = document.getElementById('perfilCode').value.toUpperCase().trim();
      if (!code) return alert("Por favor ingresa un código.");
      let r = await enviarAccion({ accion: 'validarCodigo', codigo: code });
      
      if(r.valido && r.modo === 'activo') { CODIGO_ACTIVO = code; actualizarBotonLogout(); renderizarPerfilActivo(); } 
      else if (r.valido && r.modo === 'registro') { CODIGO_ACTIVO = code; mostrarRegistroModal(); }
      else alert(r.error || "Código no válido.");
    }

    function renderizarPerfilActivo() {
        if(!CODIGO_ACTIVO || !DATA) return;
        let misPreds = DATA.predicciones.filter(p => p.cod === CODIGO_ACTIVO);
        let jugador = DATA.jugadores.find(j => j.cod === CODIGO_ACTIVO);
        let deudaTotal = jugador.deuda || 0; let ganado = misPreds.reduce((sum, p) => sum + (Number(p.ganancia) || 0), 0);
        
        let misEquiposHTML = (jugador.eq && jugador.eq.length > 0) ? `<span style="font-size: 16px;">${jugador.eq.join(', ')}</span>` : `<div style="display:flex; align-items:center; gap:8px;"><span style="font-size: 20px;">⏳</span><span style="color: #cbd5e1;"><b>Esperando Sorteo Oficial</b><br>Se asignará cuando inicie la quiniela.</span></div>`;
        let apuestasHTML = (misPreds.length === 0) ? `<div class="empty-state"><div style="font-size: 30px; margin-bottom: 10px;">⚽</div><b style="color:white;">¡Aún no has hecho pronósticos!</b><br><span style="font-size:12px; color:#94a3b8;">Gana dinero apostando a los partidos de hoy.</span><br><button onclick="switchTab('tab-matches', document.getElementById('nav-matches'))" style="margin-top: 15px; padding: 10px; width:auto; font-size: 13px;">Ir a la Sala de Apuestas</button></div>` : `<ul style="font-size:12px; padding-left:0; list-style:none; color:#cbd5e1; max-height: 250px; overflow-y: auto;">` + misPreds.map(p => {
              let pData = DATA.partidos.find(x => x.id === p.pid); let pNombre = pData ? `${pData.eq1} vs ${pData.eq2}` : `Partido ${p.pid}`; let vStr = p.val === '1' ? 'Local' : (p.val === '2' ? 'Visita' : 'Empate');
              return `<li style="margin-bottom:8px; background:rgba(0,0,0,0.2); padding:10px; border-radius:6px; border-left: 3px solid ${p.ganancia > 0 ? '#10b981' : '#475569'};"><b>${pNombre}</b><br>Pronosticaste: <b style="color:white;">${vStr}</b>${p.ganancia > 0 ? `<br><span style="color:#10b981; font-weight:bold;">✅ Premio Acertado: +$${p.ganancia.toFixed(2)} MXN</span>` : ''}</li>`;
            }).join('') + `</ul>`;
        
        document.getElementById('profileLogin').style.display = 'none';
        document.getElementById('profileData').innerHTML = `<h3 style="text-align:center; color:#00f2fe; margin-top:0;">Ficha de ${jugador.apodo}</h3><div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:8px; margin-bottom:20px; font-size:14px; border-left: 4px solid #00f2fe;"><b style="color:#00f2fe; display:block; margin-bottom:8px;">Tus equipos (Mundialista):</b>${misEquiposHTML}</div><div style="display:flex; gap:10px;"><div class="profile-stat" style="flex:1; border-color:#ef4444; background: rgba(239, 68, 68, 0.05);"><h2 style="color:#ef4444;">$${deudaTotal}</h2><small>Por Pagar (Deuda)</small></div><div class="profile-stat" style="flex:1; border-color:#10b981; background: rgba(16, 185, 129, 0.05);"><h2 style="color:#10b981;">$${ganado.toFixed(2)}</h2><small>Ganancias Reales</small></div></div><h4 style="margin-bottom:10px; margin-top: 20px;">Tus Apuestas Activas:</h4>${apuestasHTML}`;
        document.getElementById('profileData').style.display = 'block';
    }

    function dibujarBracket() {
      const svg = document.getElementById('bracketSvg'); const isMobile = window.innerWidth <= 850;
      svg.setAttribute("viewBox", isMobile ? "0 0 800 1200" : "0 0 1000 1000"); 
      if (!document.getElementById('pathLayer')) svg.innerHTML = `<defs><clipPath id="circle-clip" clipPathUnits="objectBoundingBox"><circle cx="0.5" cy="0.5" r="0.5"></circle></clipPath></defs><g id="pathLayer"></g><g id="nodeLayer"></g><g id="championGroup"></g>`;
      
      let pathLayer = document.getElementById('pathLayer'); let nodeLayer = document.getElementById('nodeLayer'); let champGroup = document.getElementById('championGroup');
      const CX = 500, CY = 500; const radios = { R1: 450, R2: 360, R3: 260, R4: 170, R5: 85 }; const slots = { R1: 32, R2: 16, R3: 8, R4: 4, R5: 2 }; const rondas = Object.keys(slots); let coords = {};
      
      rondas.forEach(r => {
        for(let i=0; i<slots[r]; i++) {
          let x, y;
          if (!isMobile) { let ang = (i * 2 * Math.PI) / slots[r] - Math.PI/2; x = CX + radios[r] * Math.cos(ang); y = CY + radios[r] * Math.sin(ang); } 
          else {
            let isLeft = i < (slots[r] / 2);
            if (r === 'R1') { x = isLeft ? 50 : 750; y = 40 + (isLeft ? i : i - 16) * 72; } 
            else { let pR = rondas[rondas.indexOf(r)-1]; let c1 = coords[pR+'_'+(i*2)]; let c2 = coords[pR+'_'+(i*2+1)]; x = isLeft ? { R2: 150, R3: 250, R4: 330, R5: 385 }[r] : 800 - { R2: 150, R3: 250, R4: 330, R5: 385 }[r]; y = (c1.y + c2.y) / 2; }
          }
          coords[r + '_' + i] = {x, y};
        }
      });

      for (let r = 0; r < rondas.length - 1; r++) {
        let rAct = rondas[r], rSig = rondas[r+1];
        for (let i = 0; i < slots[rAct]; i++) {
          let p1 = coords[rAct+'_'+i], p2 = coords[rSig+'_'+Math.floor(i/2)], pM;
          if(!isMobile){ let rMedio = (radios[rAct]+radios[rSig])/2; let ang1 = (i*2*Math.PI)/slots[rAct] - Math.PI/2; pM = {x: CX + rMedio * Math.cos(ang1), y: CY + rMedio * Math.sin(ang1)}; } else { pM = {x: p2.x, y: p1.y}; }
          
          let pathId = `link_${rAct}_${i}`; let path = document.getElementById(pathId); 
          if (!path) { path = document.createElementNS("http://www.w3.org/2000/svg", "path"); path.id = pathId; path.setAttribute("class", "node-link"); pathLayer.appendChild(path); }
          let eqOrigen = DATA.bracket[rAct+'_'+i], eqDestino = DATA.bracket[rSig+'_'+Math.floor(i/2)];
          if(eqOrigen && eqOrigen !== "Eliminado" && eqOrigen === eqDestino) path.classList.add('active'); else path.classList.remove('active');
          path.setAttribute("d", `M ${p1.x} ${p1.y} L ${pM.x} ${pM.y} L ${p2.x} ${p2.y}`);
        }
      }

      rondas.forEach(r => {
        let radioCirculo = isMobile ? 18 : 16;
        for(let i=0; i<slots[r]; i++) {
          let pos = coords[r+'_'+i]; let equipo = DATA.bracket[r+'_'+i] || ""; let isEliminated = false, isFrontier = false;
          if(equipo && equipo !== "Eliminado") {
            let proxRonda = {R1:'R2', R2:'R3', R3:'R4', R4:'R5', R5:'Campeon'}[r]; let proxSlot = (proxRonda === 'Campeon') ? 0 : Math.floor(i/2); let equipoSiguiente = DATA.bracket[proxRonda+'_'+proxSlot];
            if(!equipoSiguiente) isFrontier = true; else if(equipoSiguiente !== equipo && equipoSiguiente !== "Eliminado") isEliminated = true;
          }

          let groupId = `node_${r}_${i}`; let g = document.getElementById(groupId);
          if (!g) { g = document.createElementNS("http://www.w3.org/2000/svg", "g"); g.id = groupId; g.setAttribute("class", "node-group"); let c = document.createElementNS("http://www.w3.org/2000/svg", "circle"); c.setAttribute("class", "node-circle"); g.appendChild(c); nodeLayer.appendChild(g); }
          
          let c = g.querySelector('circle'); c.setAttribute("r", radioCirculo); g.setAttribute("transform", `translate(${pos.x}, ${pos.y})`);
          g.className.baseVal = "node-group" + (isEliminated ? " eliminated-node" : ""); c.className.baseVal = "node-circle" + (equipo && equipo !== "Eliminado" ? " active" : "") + (isFrontier ? " frontier-spark" : "");
          let oldImg = g.querySelector('image'); let oldText = g.querySelector('text'); if(oldImg) oldImg.remove(); if(oldText) oldText.remove();

          if(ES_ADMIN && equipo && equipo !== "Eliminado") {
            g.onclick = async () => {
              let g1 = prompt(`Marcador final:\n¿Goles de ${equipo}?`, "0"); if (g1 === null) return;
              let g2 = prompt("¿Goles del equipo rival?", "0"); if (g2 === null) return;
              let partidoRealId = r + "_" + Math.floor(i/2); 
              let res = await enviarAccion({ accion: 'avanzarManual', ganadorAvanza: equipo, partidoId: partidoRealId, g1: g1, g2: g2 });
              if(res && !res.error) { DATA = res; dibujarBracket(); renderizarPartidos(); alert("¡Marcador registrado y bolsas repartidas!"); } else if(res.error) alert(res.error);
            };
          } else g.onclick = null;

          if(equipo && equipo !== "Eliminado") {
            let nombreLimpio = equipo.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s.-]/g, '').trim(); let flagCode = FLAG_MAP[nombreLimpio];
            if(flagCode) { let img = document.createElementNS("http://www.w3.org/2000/svg", "image"); img.setAttribute("href", `https://flagcdn.com/w40/${flagCode}.png`); img.setAttribute("x", -radioCirculo); img.setAttribute("y", -radioCirculo); img.setAttribute("width", radioCirculo*2); img.setAttribute("height", radioCirculo*2); img.setAttribute("preserveAspectRatio", "xMidYMid slice"); img.setAttribute("clip-path", "url(#circle-clip)"); img.style.pointerEvents = "none"; g.appendChild(img); }
            let t = document.createElementNS("http://www.w3.org/2000/svg", "text"); t.setAttribute("x", 0); t.setAttribute("y", radioCirculo + (isMobile ? 14 : 12)); t.setAttribute("text-anchor", "middle"); t.setAttribute("class", "node-text"); t.textContent = nombreLimpio; g.appendChild(t);
          }
        }
      });

      let camp = DATA.bracket['Campeon_0']; let campX = isMobile ? 400 : CX; let campY = isMobile ? coords['R5_0'].y : CY; 
      champGroup.setAttribute("transform", `translate(${campX}, ${campY})`); champGroup.innerHTML = ''; 

      if (camp) {
         let nombreLimpio = camp.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s.-]/g, '').trim(); let flagCode = FLAG_MAP[nombreLimpio];
         let jugador = DATA.jugadores.find(j => j.eq && j.eq.includes(camp)); let dueno = jugador ? jugador.apodo : "S/A";
         champGroup.setAttribute("class", "node-group glowing-champion");
         let circle = document.createElementNS("http://www.w3.org/2000/svg", "circle"); circle.setAttribute("cx", 0); circle.setAttribute("cy", -15); circle.setAttribute("r", 40); circle.setAttribute("fill", "#0f172a"); circle.setAttribute("stroke", "#00f2fe"); circle.setAttribute("stroke-width", "3.5"); champGroup.appendChild(circle);
         if(flagCode) { let img = document.createElementNS("http://www.w3.org/2000/svg", "image"); img.setAttribute("href", `https://flagcdn.com/w80/${flagCode}.png`); img.setAttribute("x", -34); img.setAttribute("y", -49); img.setAttribute("width", 68); img.setAttribute("height", 68); img.setAttribute("preserveAspectRatio", "xMidYMid slice"); img.setAttribute("clip-path", "url(#circle-clip)"); champGroup.appendChild(img); }
         let tNombre = document.createElementNS("http://www.w3.org/2000/svg", "text"); tNombre.setAttribute("x", 0); tNombre.setAttribute("y", 45); tNombre.setAttribute("text-anchor", "middle"); tNombre.setAttribute("font-size", "16px"); tNombre.setAttribute("font-weight", "bold"); tNombre.setAttribute("fill", "white"); tNombre.textContent = nombreLimpio; champGroup.appendChild(tNombre);
         let tDueno = document.createElementNS("http://www.w3.org/2000/svg", "text"); tDueno.setAttribute("x", 0); tDueno.setAttribute("y", 65); tDueno.setAttribute("text-anchor", "middle"); tDueno.setAttribute("font-size", "14px"); tDueno.setAttribute("fill", "#00f2fe"); tDueno.setAttribute("font-weight", "bold"); tDueno.textContent = "🥇 Ganador: " + dueno; champGroup.appendChild(tDueno);
      } else {
         champGroup.setAttribute("class", "node-group");
         let tTrofeo = document.createElementNS("http://www.w3.org/2000/svg", "text"); tTrofeo.setAttribute("x", 0); tTrofeo.setAttribute("y", -5); tTrofeo.setAttribute("text-anchor", "middle"); tTrofeo.setAttribute("font-size", "45px"); tTrofeo.textContent = "🏆"; champGroup.appendChild(tTrofeo);
         let tEspera = document.createElementNS("http://www.w3.org/2000/svg", "text"); tEspera.setAttribute("x", 0); tEspera.setAttribute("y", 30); tEspera.setAttribute("text-anchor", "middle"); tEspera.setAttribute("font-size", "14px"); tEspera.setAttribute("fill", "rgba(255,255,255,0.4)"); tEspera.setAttribute("font-weight", "bold"); tEspera.textContent = "Esperando Campeón"; champGroup.appendChild(tEspera);
      }
    }
  </script>
</body>
